services:

  billing-api:
    build:
      context: ./services/api
    image: knvox/billing-api:1.3.5
    container_name: knvox-billing-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BILLING_API_TOKEN: ${BILLING_API_TOKEN}
      TZ: ${TIMEZONE}
    ports:
      - "127.0.0.1:${BILLING_API_PORT}:8080"
    networks:
      - backend
      - database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
