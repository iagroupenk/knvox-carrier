services:

  customer-portal:
    image: nginx:1.27-alpine
    container_name: knvox-customer-portal
    restart: unless-stopped
    environment:
      BILLING_API_TOKEN: ${BILLING_API_TOKEN}
      TZ: ${TIMEZONE}
    ports:
      - "127.0.0.1:${PORTAL_PORT}:80"
    volumes:
      - ./services/frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./services/frontend/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - backend
    depends_on:
      billing-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
