services:

  customer-portal:
    image: nginx:1.27-alpine
    container_name: knvox-customer-portal
    restart: unless-stopped
    environment:
      BILLING_API_TOKEN: ${BILLING_API_TOKEN}
      TZ: ${TIMEZONE}
    ports:
      - "127.0.0.1:${PORTAL_PORT}:80"
    volumes:
      - ./services/frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./services/frontend/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - backend
    depends_on:
      billing-api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.customer-portal.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.customer-portal.entrypoints=websecure"
      - "traefik.http.routers.customer-portal.tls=true"
      - "traefik.http.routers.customer-portal.tls.certresolver=${PORTAL_TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.customer-portal.middlewares=customer-portal-auth@docker"
      - "traefik.http.services.customer-portal.loadbalancer.server.port=80"

      - "traefik.http.routers.customer-portal-http.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.customer-portal-http.entrypoints=web"
      - "traefik.http.routers.customer-portal-http.middlewares=customer-portal-redirect@docker"

      - "traefik.http.middlewares.customer-portal-auth.basicauth.users=${PORTAL_BASIC_AUTH_ESCAPED}"
      - "traefik.http.middlewares.customer-portal-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.customer-portal-redirect.redirectscheme.permanent=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
