services:
  admin-web-proxy:
    image: nginx:alpine
    container_name: knvox-admin-web-proxy
    restart: unless-stopped
    networks:
      - knvox_frontend
    volumes:
      - ../../configs/admin-web-proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=knvox_frontend"
      - "traefik.http.routers.knvox-admin-web.entrypoints=websecure"
      - "traefik.http.routers.knvox-admin-web.rule=Host(`portal.knvox.enaes.net`) && (PathPrefix(`/admin`) || PathPrefix(`/api/admin`))"
      - "traefik.http.routers.knvox-admin-web.priority=200"
      - "traefik.http.routers.knvox-admin-web.tls=true"
      - "traefik.http.routers.knvox-admin-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.knvox-admin-web.middlewares=customer-portal-auth@docker"
      - "traefik.http.services.knvox-admin-web.loadbalancer.server.port=8080"

networks:
  knvox_frontend:
    external: true
